<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="每日事项" />
<meta name="theme-color" content="#f5f4f0" />
<title>每日事项</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#f5f4f0;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;color:#1a1a1a;}
.app{max-width:480px;margin:0 auto;padding-bottom:60px;}

.header{background:#f5f4f0;padding:20px 16px 12px;position:sticky;top:0;z-index:10;}
.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.nav-btn{width:40px;height:40px;border:0.5px solid #dddcd5;border-radius:12px;background:#fff;color:#999;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-btn:active{background:#eee;}
.date-picker-wrap{position:relative;flex:1;text-align:center;}
#hidden-date{position:absolute;opacity:0;width:1px;height:1px;top:0;left:0;pointer-events:none;}
.date-center{cursor:pointer;display:inline-block;padding:4px 8px;border-radius:8px;}
.date-center:active{background:#eee;}
.date-main{font-size:22px;font-weight:700;color:#1a1a1a;}
.date-dow{font-size:12px;color:#aaa;margin-top:2px;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:#fff;border-radius:12px;padding:10px 0;text-align:center;border:0.5px solid #eeeee8;}
.stat-num{font-size:22px;font-weight:600;color:#1a1a1a;}
.stat-num.green{color:#1D9E75;}
.stat-label{font-size:10px;color:#bbb;margin-top:2px;}

.add-card{margin:12px 16px;background:#fff;border-radius:16px;border:0.5px solid #e0dfd8;padding:16px;}
.add-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.row-label{font-size:13px;color:#bbb;width:28px;flex-shrink:0;}
.row-right{flex:1;display:flex;align-items:center;gap:8px;}
.row-input{flex:1;height:40px;border:0.5px solid #e0dfd8;border-radius:10px;padding:0 12px;font-size:15px;background:#fafaf8;color:#1a1a1a;outline:none;-webkit-appearance:none;font-family:inherit;width:100%;}
.row-input:focus{border-color:#1D9E75;background:#fff;}
.time-input{max-width:150px;flex:none;}
.optional{font-size:11px;color:#ccc;white-space:nowrap;}
.submit-btn{width:100%;height:46px;border:none;border-radius:12px;background:#fff;border:0.5px solid #e0dfd8;color:#1a1a1a;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.submit-btn:active{background:#f0efe8;}

.tasks-wrap{padding:0 16px;}
.empty{text-align:center;padding:2.5rem 0;color:#ccc;font-size:14px;}
.tasks{display:flex;flex-direction:column;gap:8px;}
.task-card{background:#fff;border-radius:14px;border:0.5px solid #e8e8e2;padding:12px 13px;display:flex;gap:10px;align-items:flex-start;}
.task-card.done{background:#f9f9f7;border-color:#eeeee8;}
.check-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid #ccc;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.task-card.done .check-btn{background:#1D9E75;border-color:#1D9E75;}
.tick{display:none;}
.task-card.done .tick{display:block;}
.task-body{flex:1;min-width:0;}
.task-time{font-size:11px;color:#bbb;margin-bottom:3px;}
.task-text{font-size:15px;color:#1a1a1a;line-height:1.45;word-break:break-all;}
.task-card.done .task-text{color:#bbb;text-decoration:line-through;}
.task-note{font-size:12px;color:#999;margin-top:5px;line-height:1.4;word-break:break-all;}
.task-card.done .task-note{color:#ccc;}
.del-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:22px;line-height:1;padding:0;flex-shrink:0;}
.del-btn:active{color:#e24b4a;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="date-bar">
      <button class="nav-btn" id="prev">&#8249;</button>
      <div class="date-picker-wrap">
        <div class="date-center" id="date-center">
          <div class="date-main" id="date-main"></div>
          <div class="date-dow" id="date-dow"></div>
        </div>
        <input type="date" id="hidden-date" />
      </div>
      <button class="nav-btn" id="next">&#8250;</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">全部</div></div>
      <div class="stat"><div class="stat-num green" id="s-done">0</div><div class="stat-label">完成</div></div>
      <div class="stat"><div class="stat-num" id="s-left">0</div><div class="stat-label">待办</div></div>
    </div>
  </div>

  <div class="add-card">
    <div class="add-row">
      <span class="row-label">时间</span>
      <div class="row-right">
        <input type="time" class="row-input time-input" id="f-time" />
        <span class="optional">（选填）</span>
      </div>
    </div>
    <div class="add-row">
      <span class="row-label">事项</span>
      <div class="row-right">
        <input type="text" class="row-input" id="f-text" placeholder="记录这件事..." maxlength="80" />
      </div>
    </div>
    <div class="add-row" style="margin-bottom:14px;">
      <span class="row-label">备注</span>
      <div class="row-right">
        <input type="text" class="row-input" id="f-note" placeholder="补充说明（选填）" maxlength="120" />
      </div>
    </div>
    <button class="submit-btn" id="add-btn">添加事项</button>
  </div>

  <div class="tasks-wrap">
    <div id="task-list"></div>
  </div>

</div>

<script>
const TICK=`<svg class="tick" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5L5.5 10L11 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
let cur=today(),data={};
function today(){return new Date().toISOString().slice(0,10);}
function fmtMain(d){const[,m,day]=d.split('-');return`${parseInt(m)}/${parseInt(day)}`;}
function fmtDow(d){const dt=new Date(d+'T00:00:00');const dow=['周日','周一','周二','周三','周四','周五','周六'][dt.getDay()];return d===today()?`${dt.getFullYear()} · ${dow} · 今天`:`${dt.getFullYear()} · ${dow}`;}
function get(d){return data[d]||[];}
function save(d,arr){data[d]=arr;try{localStorage.setItem('daily_tasks_v1',JSON.stringify(data));}catch(e){}}
function load(){try{const r=localStorage.getItem('daily_tasks_v1');if(r)data=JSON.parse(r);}catch(e){data={};}}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const tasks=get(cur),done=tasks.filter(t=>t.done).length;
  document.getElementById('date-main').textContent=fmtMain(cur);
  document.getElementById('date-dow').textContent=fmtDow(cur);
  document.getElementById('hidden-date').value=cur;
  document.getElementById('s-total').textContent=tasks.length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=tasks.length-done;
  const list=document.getElementById('task-list');
  if(!tasks.length){list.innerHTML='<div class="empty">还没有事项</div>';return;}
  const sorted=tasks.map((t,i)=>({...t,_i:i})).sort((a,b)=>(!a.time&&!b.time)?0:!a.time?1:!b.time?-1:a.time.localeCompare(b.time));
  list.innerHTML='<div class="tasks">'+sorted.map(t=>`
    <div class="task-card${t.done?' done':''}">
      <button class="check-btn" data-i="${t._i}">${TICK}</button>
      <div class="task-body">
        ${t.time?`<div class="task-time">${esc(t.time)}</div>`:''}
        <div class="task-text">${esc(t.text)}</div>
        ${t.note?`<div class="task-note">${esc(t.note)}</div>`:''}
      </div>
      <button class="del-btn" data-i="${t._i}">&#215;</button>
    </div>`).join('')+'</div>';
}

function addTask(){
  const text=document.getElementById('f-text').value.trim();
  if(!text){document.getElementById('f-text').focus();return;}
  const time=document.getElementById('f-time').value;
  const note=document.getElementById('f-note').value.trim();
  get(cur);const tasks=get(cur);
  tasks.push({text,time,note,done:false,created:Date.now()});
  save(cur,tasks);
  document.getElementById('f-text').value='';
  document.getElementById('f-time').value='';
  document.getElementById('f-note').value='';
  render();
}

function shift(n){const d=new Date(cur+'T00:00:00');d.setDate(d.getDate()+n);cur=d.toISOString().slice(0,10);render();}

document.getElementById('prev').addEventListener('click',()=>shift(-1));
document.getElementById('next').addEventListener('click',()=>shift(1));
document.getElementById('add-btn').addEventListener('click',addTask);
document.getElementById('f-text').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('date-center').addEventListener('click',()=>{const el=document.getElementById('hidden-date');if(el.showPicker)el.showPicker();});
document.getElementById('hidden-date').addEventListener('change',e=>{if(e.target.value){cur=e.target.value;render();}});
document.getElementById('task-list').addEventListener('click',e=>{
  const cb=e.target.closest('.check-btn'),db=e.target.closest('.del-btn');
  if(cb){const i=parseInt(cb.dataset.i),tasks=get(cur);tasks[i].done=!tasks[i].done;save(cur,tasks);render();}
  if(db){const i=parseInt(db.dataset.i);if(confirm('确认删除？')){const tasks=get(cur);tasks.splice(i,1);save(cur,tasks);render();}}
});
load();render();
</script>
</body>
</html>
